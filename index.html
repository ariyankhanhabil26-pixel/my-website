<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#202123;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:250px;
background:#111;
padding:15px;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:15px;
background:#343541;
text-align:center;
}

.chat{
flex:1;
padding:15px;
overflow-y:auto;
}

.msg{
padding:10px;
margin:10px 0;
border-radius:8px;
max-width:70%;
}

.user{background:#0B93F6;margin-left:auto;}
.bot{background:#444654;}

.input-area{
display:flex;
padding:10px;
background:#343541;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
}

button{
margin-left:10px;
padding:12px;
background:#10A37F;
border:none;
color:white;
border-radius:8px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>AI Chat</h2>
</div>

<div class="main">

<div class="header">🤖 My AI Website</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Type message...">
<button onclick="send()">Send</button>
</div>

</div>

<script>
function send(){
let input=document.getElementById("input");
let text=input.value;
if(!text) return;

let chat=document.getElementById("chat");

chat.innerHTML+=`<div class="msg user">${text}</div>`;
input.value="";

setTimeout(()=>{
chat.innerHTML+=`<div class="msg bot">AI Reply: ${text}</div>`;
chat.scrollTop=chat.scrollHeight;
},500);
}
</script>

</body>
</html>
